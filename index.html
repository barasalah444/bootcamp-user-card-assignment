<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profile Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">
        
        <div class="col-main">
            
            <div class="card">
                <div class="card-header"></div>
                <div class="card-body">
                    <div class="avatar-box">
                        <div class="avatar-placeholder"></div>
                    </div>
                    <h1 class="name">Jane Doe</h1>
                    <p class="location">
                        <i class="fa-solid fa-location-dot"></i> Seattle
                    </p>
                    <p class="job-title">Developer | Engineer | Problem Solver</p>
                    <p class="bio">Master of shadows and the Internet!</p>
                    <a href="#" class="edit-link">
                        <i class="fa-solid fa-gear"></i> edit profile
                    </a>
                </div>
            </div>

        </div>

    </main>

</body>
</html>
